<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Name Translator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e3350d;
      --red-dark: #b8290a;
      --blue: #3b5fa0;
      --yellow: #ffcb05;
      --bg: #f0f0f0;
      --surface: #fff;
      --border: #d0d0d0;
      --text: #1a1a1a;
      --muted: #666;
      --radius: 8px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--red);
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0;
    }

    .tab {
      padding: 8px 20px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      border-radius: 4px 4px 0 0;
      transition: color 0.15s;
    }

    .tab:hover { color: var(--text); }

    .tab.active {
      color: var(--red);
      border-bottom-color: var(--red);
    }

    /* Search */
    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      position: relative;
    }

    input[type="search"] {
      flex: 1;
      padding: 10px 36px 10px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    input[type="search"]::-webkit-search-cancel-button { display: none; }

    input[type="search"]:focus {
      border-color: var(--red);
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 50%;
      display: none;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: var(--text); }
    .clear-btn.visible { display: block; }

    /* Results */
    .results-info {
      font-size: 0.82rem;
      color: var(--muted);
      margin: 12px 0 8px;
    }

    .results-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      text-align: left;
      padding: 8px 10px;
      font-weight: 700;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    tbody tr:hover { background: #f9f9f9; }

    tbody td {
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }

    .cell-inner {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .name-text {
      flex: 1;
    }

    .copy-btn {
      opacity: 0;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 4px;
      padding: 3px 5px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
      line-height: 0;
      flex-shrink: 0;
    }

    tbody tr:hover .copy-btn { opacity: 1; }

    .copy-btn:hover {
      background: var(--yellow);
      border-color: #cca000;
      color: var(--text);
    }

    .copy-btn.copied {
      opacity: 1;
      background: #d4edda;
      border-color: #5cb85c;
      color: #2d6a2d;
    }

    .copy-btn svg { display: block; }

    /* Match highlight */
    mark {
      background: #fff3cd;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* Empty / loading states */
    .state-msg {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }

    .state-msg .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .state-msg p { font-size: 0.9rem; }

    .loader {
      text-align: center;
      padding: 48px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader p { color: var(--muted); font-size: 0.9rem; }
    .loader .progress { margin-top: 8px; font-size: 0.8rem; color: #aaa; }

    .error-msg {
      background: #fde8e8;
      border: 1px solid #f5c0c0;
      border-radius: var(--radius);
      padding: 12px 16px;
      color: #c0392b;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .error-msg button {
      margin-left: auto;
      padding: 4px 12px;
      border: 1px solid #c0392b;
      background: none;
      border-radius: 4px;
      cursor: pointer;
      color: #c0392b;
      font-size: 0.85rem;
    }

    .error-msg button:hover { background: #c0392b; color: #fff; }

    footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.78rem;
      color: #aaa;
    }
    footer a { color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Pokemon Name Translator</h1>
      <p>Translate Pokemon, move, and item names between EN / DE / FR / IT / ES</p>
    </header>

    <div class="card">
      <div class="tabs">
        <button class="tab active" data-cat="pokemon">Pokemon</button>
        <button class="tab" data-cat="moves">Moves</button>
        <button class="tab" data-cat="items">Items</button>
      </div>

      <div class="search-row">
        <input type="search" id="searchInput" placeholder="Type a name in any language…" autocomplete="off" spellcheck="false">
        <button class="clear-btn" id="clearBtn" aria-label="Clear search">&#x2715;</button>
      </div>

      <div id="resultsInfo" class="results-info" hidden></div>

      <div id="resultsArea">
        <div class="state-msg">
          <div class="icon">🔍</div>
          <p>Start typing to search</p>
        </div>
      </div>
    </div>

    <footer>
      Data from <a href="https://pokeapi.co/" target="_blank">PokéAPI</a>
    </footer>
  </div>

  <script>
    const CACHE_KEY = 'pokemon_translator_v2';
    const GQL = 'https://beta.pokeapi.co/graphql/v1beta';
    const LANGS = ['en','de','fr','it','es'];
    const LANG_LABELS = { en: 'English', de: 'Deutsch', fr: 'Français', it: 'Italiano', es: 'Español' };
    // PokeAPI language IDs
    const LANG_IDS = { fr: 5, de: 6, es: 7, it: 8, en: 9 };
    const LANG_ID_MAP = Object.fromEntries(Object.entries(LANG_IDS).map(([k,v]) => [v,k]));

    const MAX_RESULTS = 100;

    // State
    let cache = null; // { pokemon, moves, items } each = { byId: {id: {en,de,fr,it,es}}, index: {lang: {lower_name: id}} }
    let currentCat = 'pokemon';

    // DOM
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const resultsArea = document.getElementById('resultsArea');
    const resultsInfo = document.getElementById('resultsInfo');

    // --- GQL fetch helper ---
    async function gqlFetch(query) {
      const resp = await fetch(GQL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });
      if (!resp.ok) throw new Error(`GraphQL error: ${resp.status}`);
      const json = await resp.json();
      if (json.errors) throw new Error(json.errors[0].message);
      return json.data;
    }

    // Build category data from raw name rows
    function buildCategoryData(rows, idField) {
      const byId = {};
      for (const row of rows) {
        const id = row[idField];
        const lang = LANG_ID_MAP[row.language_id];
        if (!lang) continue;
        if (!byId[id]) byId[id] = {};
        byId[id][lang] = row.name;
      }
      // Build inverted index: lang -> lower_name -> id
      const index = {};
      for (const lang of LANGS) index[lang] = {};
      for (const [id, names] of Object.entries(byId)) {
        for (const lang of LANGS) {
          if (names[lang]) {
            index[lang][names[lang].toLowerCase()] = Number(id);
          }
        }
      }
      return { byId, index };
    }

    // --- Load data ---
    async function loadData() {
      // Try cache
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (raw) {
          cache = JSON.parse(raw);
          return;
        }
      } catch(e) {}

      showLoader('Fetching data from PokéAPI…', 'This only happens once. Please wait.');

      const langFilter = '[5,6,7,8,9]';

      try {
        // Parallel fetch all 3 categories
        const [pokemonData, movesData, itemsData] = await Promise.all([
          gqlFetch(`{ pokemon_v2_pokemonspeciesname(where: {language_id: {_in: ${langFilter}}}) { name pokemon_species_id language_id } }`),
          gqlFetch(`{ pokemon_v2_movename(where: {language_id: {_in: ${langFilter}}}) { name move_id language_id } }`),
          gqlFetch(`{ pokemon_v2_itemname(where: {language_id: {_in: ${langFilter}}}) { name item_id language_id } }`),
        ]);

        cache = {
          pokemon: buildCategoryData(pokemonData.pokemon_v2_pokemonspeciesname, 'pokemon_species_id'),
          moves:   buildCategoryData(movesData.pokemon_v2_movename, 'move_id'),
          items:   buildCategoryData(itemsData.pokemon_v2_itemname, 'item_id'),
        };

        try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch(e) {}

        showInitial();
      } catch(err) {
        showError(err.message);
      }
    }

    // --- Search ---
    function search(query, cat) {
      if (!cache) return [];
      const q = query.trim().toLowerCase();
      if (q.length < 2) return [];

      const { byId, index } = cache[cat];
      const matchedIds = new Set();

      for (const lang of LANGS) {
        const langIndex = index[lang];
        for (const [name, id] of Object.entries(langIndex)) {
          if (name.includes(q)) matchedIds.add(id);
          if (matchedIds.size >= MAX_RESULTS * 3) break;
        }
        if (matchedIds.size >= MAX_RESULTS * 3) break;
      }

      return [...matchedIds].slice(0, MAX_RESULTS).map(id => byId[id]);
    }

    // --- Render ---
    function highlight(text, query) {
      if (!query || !text) return escHtml(text || '—');
      const q = query.trim();
      if (!q) return escHtml(text);
      const idx = text.toLowerCase().indexOf(q.toLowerCase());
      if (idx === -1) return escHtml(text);
      return escHtml(text.slice(0, idx)) + '<mark>' + escHtml(text.slice(idx, idx + q.length)) + '</mark>' + escHtml(text.slice(idx + q.length));
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderResults(rows, query) {
      if (!rows.length) {
        resultsInfo.hidden = true;
        resultsArea.innerHTML = `<div class="state-msg"><div class="icon">😕</div><p>No results found</p></div>`;
        return;
      }

      const limited = rows.length >= MAX_RESULTS;
      resultsInfo.hidden = false;
      resultsInfo.textContent = limited
        ? `Showing first ${MAX_RESULTS} results — refine your search`
        : `${rows.length} result${rows.length !== 1 ? 's' : ''}`;

      const headerCells = LANGS.map(l => `<th>${LANG_LABELS[l]}</th>`).join('');
      const bodyRows = rows.map(names => {
        const cells = LANGS.map(lang => {
          const name = names[lang] || '';
          const safeId = Math.random().toString(36).slice(2);
          return `<td>
            <div class="cell-inner">
              <span class="name-text">${highlight(name, query)}</span>
              ${name ? `<button class="copy-btn" data-copy="${escHtml(name)}" title="Copy"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>` : ''}
            </div>
          </td>`;
        }).join('');
        return `<tr>${cells}</tr>`;
      }).join('');

      resultsArea.innerHTML = `
        <div class="results-wrapper">
          <table>
            <thead><tr>${headerCells}</tr></thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </div>`;
    }

    // --- UI helpers ---
    function showLoader(msg, sub = '') {
      resultsInfo.hidden = true;
      resultsArea.innerHTML = `<div class="loader">
        <div class="spinner"></div>
        <p>${escHtml(msg)}</p>
        ${sub ? `<div class="progress">${escHtml(sub)}</div>` : ''}
      </div>`;
    }

    function showInitial() {
      resultsInfo.hidden = true;
      resultsArea.innerHTML = `<div class="state-msg"><div class="icon">🔍</div><p>Start typing to search</p></div>`;
    }

    function showError(msg) {
      resultsInfo.hidden = true;
      resultsArea.innerHTML = `<div class="error-msg">
        ⚠️ Failed to load data: ${escHtml(msg)}
        <button onclick="retryLoad()">Retry</button>
      </div>`;
    }

    function retryLoad() {
      localStorage.removeItem(CACHE_KEY);
      cache = null;
      loadData();
    }
    window.retryLoad = retryLoad;

    // --- Event handlers ---
    let searchTimeout;
    searchInput.addEventListener('input', () => {
      clearBtn.classList.toggle('visible', searchInput.value.length > 0);
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const q = searchInput.value.trim();
        if (!cache) return;
        if (q.length < 2) { showInitial(); resultsInfo.hidden = true; return; }
        const rows = search(q, currentCat);
        renderResults(rows, q);
      }, 150);
    });

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearBtn.classList.remove('visible');
      showInitial();
      resultsInfo.hidden = true;
      searchInput.focus();
    });

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCat = tab.dataset.cat;
        const q = searchInput.value.trim();
        if (cache && q.length >= 2) {
          renderResults(search(q, currentCat), q);
        } else {
          showInitial();
          resultsInfo.hidden = true;
        }
      });
    });

    // Copy button delegation
    document.addEventListener('click', e => {
      const btn = e.target.closest('.copy-btn');
      if (!btn) return;
      const text = btn.dataset.copy;
      const iconCopy = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
      const iconCheck = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
      const markCopied = () => {
        btn.innerHTML = iconCheck;
        btn.classList.add('copied');
        setTimeout(() => { btn.innerHTML = iconCopy; btn.classList.remove('copied'); }, 1500);
      };
      navigator.clipboard.writeText(text).then(markCopied).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        markCopied();
      });
    });

    // --- Init ---
    loadData();
  </script>
</body>
</html>
